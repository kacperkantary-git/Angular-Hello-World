<div class="ip-container">
  <h2>{{ 'ipinfo.title' | translate }}</h2>
  <div class="input-row">
    <input [(ngModel)]="ip" [placeholder]="'ipinfo.placeholder' | translate" />
    <button (click)="check()">{{ 'ipinfo.check' | translate }}</button>
  </div>
  <p *ngIf="country">{{ 'ipinfo.country' | translate }}: <strong>{{ country }}</strong></p>
  <p *ngIf="error" class="error">{{ 'ipinfo.error' | translate }}</p>
</div>
