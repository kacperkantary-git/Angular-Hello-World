<div class="messages-container">
  @for (msg of messages; track msg) {
    <div>
      <span class="message-item">{{ msg }}</span>
    </div>
  }
  <div class="input-row">
    <input [(ngModel)]="newMessage" [placeholder]="'messages.placeholder' | translate">
    <button (click)="addMessage(newMessage)">{{ 'messages.send' | translate }}</button>
  </div>
</div>
